<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App_componentePicker_01</title>
  <link rel="icon" href="./favicon.png" />
  <style>
    /* iPhone 14 Screen Size Configuration: 430 x 932 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      padding: 20px;
      margin: 0;
    }

    #root {
      width: 430px;
      height: 932px;
      background: #ffffff;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      border-radius: 40px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 12px solid #000;
      position: relative;
    }

    /* Notch do iPhone 14 */
    #root::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 28px;
      background: #000;
      border-radius: 0 0 30px 30px;
      z-index: 1000;
    }

    /* Área de conteúdo */
    #root > * {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding-top: 10px;
    }

    /* Scrollbar customizada */
    #root > *::-webkit-scrollbar {
      width: 4px;
    }

    #root > *::-webkit-scrollbar-track {
      background: transparent;
    }

    #root > *::-webkit-scrollbar-thumb {
      background: #ccc;
      border-radius: 2px;
    }

    #root > *::-webkit-scrollbar-thumb:hover {
      background: #999;
    }

    /* Botão de Home (home indicator) */
    #root::after {
      content: '';
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 4px;
      background: #000;
      border-radius: 2px;
      z-index: 1000;
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      #root {
        width: 100%;
        height: auto;
        min-height: 100vh;
        border-radius: 0;
        border: none;
      }

      #root::before,
      #root::after {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
